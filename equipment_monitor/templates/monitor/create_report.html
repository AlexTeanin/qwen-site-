{% extends "monitor/base.html" %}
{% block title %}Создать отчёт{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Новый отчёт о неисправности</h5>
            </div>
            <div class="card-body p-4">
                <form method="post" id="reportForm" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-map-marker-alt me-1"></i>Участок *
                        </label>
                        <select name="section" id="id_section" class="form-select form-select-lg" required>
                            <option value="">-- Выберите участок --</option>
                            {% for section in sections %}
                                <option value="{{ section.id }}">{{ section.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-cogs me-1"></i>Оборудование *
                        </label>
                        <select name="equipment" id="id_equipment" class="form-select form-select-lg" required>
                            <option value="">-- Сначала выберите участок --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-exclamation-triangle me-1"></i>Тип проблемы *
                        </label>
                        <select name="problem_type" id="id_problem_type" class="form-select form-select-lg" required>
                            <option value="">-- Выберите тип проблемы --</option>
                            {% for pt in form.problem_type.queryset.all %}
                                <option value="{{ pt.id }}">{{ pt.name }}</option>
                            {% endfor %}
                        </select>
                    </div>



                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-clock me-1"></i>Время начала простоя
                        </label>
                        {{ form.downtime_start }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-comment me-1"></i>Описание проблемы *
                        </label>
                        {{ form.description }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-camera me-1"></i>Фото проблемы
                        </label>
                        {{ form.photo }}
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-paper-plane me-2"></i>Отправить отчёт
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Назад
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// Динамическая загрузка оборудования при выборе участка
document.getElementById('id_section').addEventListener('change', function() {
    const sectionId = this.value;
    const equipmentSelect = document.getElementById('id_equipment');

    if (sectionId) {
        fetch(`/api/equipment/?section_id=${sectionId}`)
            .then(response => response.json())
            .then(data => {
                equipmentSelect.innerHTML = '<option value="">-- Выберите оборудование --</option>';
                data.forEach(eq => {
                    const option = document.createElement('option');
                    option.value = eq.id;
                    option.textContent = eq.name;
                    equipmentSelect.appendChild(option);
                });
            });
    } else {
        equipmentSelect.innerHTML = '<option value="">-- Сначала выберите участок --</option>';
    }
});
</script>
{% endblock %}
