{% extends "monitor/base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-header bg-primary text-white text-center py-4">
                <i class="fas fa-industry fa-3x mb-2"></i>
                <h4 class="mb-0 fw-bold">Мониторинг оборудования</h4>
                <small>Система учёта неисправностей</small>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-user me-1"></i>Логин
                        </label>
                        <input type="text" name="username" class="form-control form-control-lg" required autofocus placeholder="Введите логин">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-lock me-1"></i>Пароль
                        </label>
                        <input type="password" name="password" class="form-control form-control-lg" required placeholder="Введите пароль">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
